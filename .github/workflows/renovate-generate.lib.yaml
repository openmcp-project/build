name: Renovate Generate (lib)

on:
  workflow_call:
    inputs:
      app_id:
        description: 'GitHub App ID for creating a GitHub App token'
        required: false
        default: 1312871 # OpenMCP CI GitHub App
        type: string
    secrets:
      app_private_key:
        description: 'GitHub App private key for creating a GitHub App token.'
        required: false


permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-24.04

    steps:
      - name: Create GitHub App token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        id: app-token
        with:
          app-id: ${{ inputs.app_id }}
          private-key: ${{ case( secrets.app_private_key != '', secrets.app_private_key, secrets.OPENMCP_CI_APP_PRIVATE_KEY ) }}

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          submodules: recursive
          ref: ${{ github.ref_name }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.mod

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run task generate
        run: task generate --verbose

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || (git add -A && git commit -m "chore: regenerate after dependency update" && git push)
