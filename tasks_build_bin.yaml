version: 3

includes:
  gen:
    taskfile: tasks_gen.yaml
    internal: true
  val:
    taskfile: tasks_val.yaml
    internal: true

tasks:
  # This is a dummy task that serves as a separator between task namespaces in the 'task -l' output.
  "---":
    desc: "{{.BLD_BIN_SEP}}"
    cmds:
    - cmd: echo "{{.SEP_MSG}}"
      silent: true

  build:
    desc: '  Build the binary for $OS/$ARCH.'
    summary: |
      This task builds the binary for the current operating system and architecture.
      To overwrite this, set the 'OS' and 'ARCH' environment variables.
      The binary is saved in the 'bin' folder, as $COMPONENT.$OS-$ARCH.
    requires:
      vars:
      - COMPONENTS
      - OS
      - ARCH
    deps:
    - gen:tidy
    cmds:
    - task: gen:generate # don't use deps, since they are executed in parallel
    - task: val:validate # and we want the code generation
    - task: val:test # to be executed before the validation.
    - task: build-raw
      vars:
        OS: '{{.OS}}'
        ARCH: '{{.ARCH}}'

  build-raw:
    desc: "  Build the binary. Opposed to the regular build, this one just builds and skips code generation/validation tasks."
    summary: |
      This task builds the binary for the current operating system and architecture.
      To overwrite this, set the 'OS' and 'ARCH' environment variables.
      The binary is saved in the 'bin' folder, as $COMPONENT.$OS-$ARCH.
    requires:
      vars:
      - COMPONENTS
      - OS
      - ARCH
      - VERSION
      - GIT_TREE_STATE
      - GIT_COMMIT
      - BUILD_DATE
      - MODULE_NAME
    cmds:
    - for:
        var: COMPONENTS
        as: COMPONENT
      cmd: 'CGO_ENABLED=0 GOOS={{.OS}} GOARCH={{.ARCH}} go build -a -ldflags="-X {{.MODULE_NAME}}/internal/version.buildVersion={{.VERSION}} -X {{.MODULE_NAME}}/internal/version.gitTreeState={{.GIT_TREE_STATE}} -X {{.MODULE_NAME}}/internal/version.gitCommit={{.GIT_COMMIT}} -X {{.MODULE_NAME}}/internal/version.buildDate={{.BUILD_DATE}}" -o {{.ROOT_DIR2}}/bin/{{.COMPONENT}}.{{.OS}}-{{.ARCH}} {{.ROOT_DIR2}}/cmd/{{.COMPONENT}}/main.go'

  build-multi-raw:
    desc: "  Build multi-platform binaries. Skips code generation/validation tasks."
    requires:
      vars:
      - COMPONENTS
      - ALL_OS
      - ALL_ARCH
    cmds:
    - for:
       matrix:
          OS:
            ref: .ALL_OS
          ARCH:
            ref: .ALL_ARCH
      vars:
        OS: '{{.ITEM.OS}}'
        ARCH: '{{.ITEM.ARCH}}'
      task: build-raw

  all:
    desc: "  Build multi-platform binaries."
    aliases:
    - build-multi
    requires:
      vars:
      - COMPONENTS
      - ALL_OS
      - ALL_ARCH
    cmds:
    - for:
       matrix:
          OS:
            ref: .ALL_OS
          ARCH:
            ref: .ALL_ARCH
      vars:
        OS: '{{.ITEM.OS}}'
        ARCH: '{{.ITEM.ARCH}}'
      task: build

  build-fips:
    desc: '  Build FIPS-compliant binary for $OS/$ARCH using Microsoft Go + GOEXPERIMENT=systemcrypto.'
    summary: |
      Builds a FIPS-compliant binary using the Microsoft Go toolchain inside Docker.
      The binary is compiled with GOEXPERIMENT=systemcrypto so that all crypto/* calls
      are routed through the system OpenSSL (gardenlinux-fips) via dlopen at runtime.
      Cross-compilation is fully handled inside the Docker builder image — no special
      host toolchain required beyond Docker.
      The binary is saved in the 'bin' folder, as $COMPONENT.$OS-$ARCH.
    requires:
      vars:
      - COMPONENTS
      - OS
      - ARCH
    deps:
    - gen:tidy
    cmds:
    - task: gen:generate
    - task: val:validate
    - task: val:test
    - task: build-fips-raw
      vars:
        OS: '{{.OS}}'
        ARCH: '{{.ARCH}}'

  build-fips-raw:
    desc: "  Build FIPS-compliant binary. Skips code generation/validation tasks."
    requires:
      vars:
      - COMPONENTS
      - OS
      - ARCH
      - VERSION
      - GIT_TREE_STATE
      - GIT_COMMIT
      - BUILD_DATE
      - MODULE_NAME
      - DOCKERFILE_FIPS_BUILDER
    vars:
      BUILDARCH:
        sh: 'docker info --format "{{"{{"}}json .Architecture{{"}}"}}" | tr -d "\"" | sed "s/x86_64/amd64/;s/aarch64/arm64/"'
    cmds:
    - for:
        var: COMPONENTS
        as: COMPONENT
      cmd: >
        docker buildx build
        --platform linux/{{.BUILDARCH}}
        --target export
        --build-arg BUILDARCH={{.BUILDARCH}}
        --build-arg TARGETOS={{.OS}}
        --build-arg TARGETARCH={{.ARCH}}
        --build-arg COMPONENT={{.COMPONENT}}
        --build-arg VERSION={{.VERSION}}
        --build-arg GIT_TREE_STATE={{.GIT_TREE_STATE}}
        --build-arg GIT_COMMIT={{.GIT_COMMIT}}
        --build-arg BUILD_DATE={{.BUILD_DATE}}
        --build-arg MODULE_NAME={{.MODULE_NAME}}
        --output type=local,dest={{.ROOT_DIR2}}/bin
        -f {{.DOCKERFILE_FIPS_BUILDER}}
        {{.ROOT_DIR2}}

  build-multi-fips-raw:
    desc: "  Build FIPS-compliant multi-platform binaries. Skips code generation/validation tasks."
    requires:
      vars:
      - COMPONENTS
      - ALL_ARCH
    cmds:
    - for:
        matrix:
          OS: [linux]
          ARCH:
            ref: .ALL_ARCH
      vars:
        OS: '{{.ITEM.OS}}'
        ARCH: '{{.ITEM.ARCH}}'
      task: build-fips-raw

  all-fips:
    desc: "  Build FIPS-compliant multi-platform binaries."
    aliases:
    - build-multi-fips
    requires:
      vars:
      - COMPONENTS
      - ALL_ARCH
    cmds:
    - for:
        matrix:
          OS: [linux]
          ARCH:
            ref: .ALL_ARCH
      vars:
        OS: '{{.ITEM.OS}}'
        ARCH: '{{.ITEM.ARCH}}'
      task: build-fips
