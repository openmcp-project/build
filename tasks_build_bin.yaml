version: 3

includes:
  gen:
    taskfile: tasks_gen.yaml
    internal: true
  val:
    taskfile: tasks_val.yaml
    internal: true

tasks:
  # This is a dummy task that serves as a separator between task namespaces in the 'task -l' output.
  "---":
    desc: "{{.BLD_BIN_SEP}}"
    cmds:
    - cmd: echo "{{.SEP_MSG}}"
      silent: true

  build:
    desc: '  Build the binary for $OS/$ARCH.'
    summary: |
      This task builds the binary for the current operating system and architecture.
      To overwrite this, set the 'OS' and 'ARCH' environment variables.
      The binary is saved in the 'bin' folder, as $COMPONENT.$OS-$ARCH.
    requires:
      vars:
      - COMPONENTS
      - OS
      - ARCH
    deps:
    - gen:tidy
    cmds:
    - task: gen:generate # don't use deps, since they are executed in parallel
    - task: val:validate # and we want the code generation
    - task: val:test # to be executed before the validation.
    - task: build-raw
      vars:
        OS: '{{.OS}}'
        ARCH: '{{.ARCH}}'

  build-raw:
    desc: "  Build the binary. Opposed to the regular build, this one just builds and skips code generation/validation tasks."
    summary: |
      This task builds the binary for the current operating system and architecture.
      To overwrite this, set the 'OS' and 'ARCH' environment variables.
      The binary is saved in the 'bin' folder, as $COMPONENT.$OS-$ARCH.
    requires:
      vars:
      - COMPONENTS
      - OS
      - ARCH
      - VERSION
      - GIT_TREE_STATE
      - GIT_COMMIT
      - BUILD_DATE
      - MODULE_NAME
    cmds:
    - for:
        var: COMPONENTS
        as: COMPONENT
      cmd: 'CGO_ENABLED=0 GOOS={{.OS}} GOARCH={{.ARCH}} go build -a -ldflags="-X {{.MODULE_NAME}}/internal/version.buildVersion={{.VERSION}} -X {{.MODULE_NAME}}/internal/version.gitTreeState={{.GIT_TREE_STATE}} -X {{.MODULE_NAME}}/internal/version.gitCommit={{.GIT_COMMIT}} -X {{.MODULE_NAME}}/internal/version.buildDate={{.BUILD_DATE}}" -o {{.ROOT_DIR2}}/bin/{{.COMPONENT}}.{{.OS}}-{{.ARCH}} {{.ROOT_DIR2}}/cmd/{{.COMPONENT}}/main.go'

  build-multi-raw:
    desc: "  Build multi-platform binaries. Skips code generation/validation tasks."
    requires:
      vars:
      - COMPONENTS
      - ALL_OS
      - ALL_ARCH
    cmds:
    - for:
       matrix:
          OS:
            ref: .ALL_OS
          ARCH:
            ref: .ALL_ARCH
      vars:
        OS: '{{.ITEM.OS}}'
        ARCH: '{{.ITEM.ARCH}}'
      task: build-raw

  all:
    desc: "  Build multi-platform binaries."
    aliases:
    - build-multi
    requires:
      vars:
      - COMPONENTS
      - ALL_OS
      - ALL_ARCH
    cmds:
    - for:
       matrix:
          OS:
            ref: .ALL_OS
          ARCH:
            ref: .ALL_ARCH
      vars:
        OS: '{{.ITEM.OS}}'
        ARCH: '{{.ITEM.ARCH}}'
      task: build

  platform-cluster-check:
    desc: "  Verify that that the operator is running against the platform cluster."
    internal: true
    requires:
      vars:
      - POD_NAMESPACE
    cmds:
    - cmd: |
        {{if .KUBECONFIG}}KUBECONFIG="{{.KUBECONFIG}}" {{end}}kubectl get namespace "{{.POD_NAMESPACE}}" >/dev/null 2>&1 || \
          { echo "Error: namespace '{{.POD_NAMESPACE}}' not found on the current cluster. Are you pointing at the platform cluster?"; exit 1; }

  run-local-init:
    desc: "  Run 'init' subcommand to install CRDs on the platform cluster."
    summary: |
      Runs the 'init' subcommand of the operator against the platform cluster.
      Must be run before 'run-local' and re-run whenever CRD definitions change.
      Set 'PROVIDER_NAME' to override the name of the ServiceProvider resource (defaults to COMPONENTS).
      Optionally set 'KUBECONFIG' to the path of the platform cluster kubeconfig.
      DEV_DEBUG=true is set automatically so the controller uses locally-reachable cluster addresses.
    requires:
      vars:
      - COMPONENTS
    vars:
      PROVIDER_NAME: '{{.PROVIDER_NAME | default .COMPONENTS}}'
    deps:
    - task: platform-cluster-check
      vars:
        POD_NAMESPACE: '{{.POD_NAMESPACE | default "openmcp-system"}}'
        KUBECONFIG: '{{.KUBECONFIG}}'
    cmds:
    - cmd: |
        {{if .KUBECONFIG}}KUBECONFIG="{{.KUBECONFIG}}" {{end}}POD_NAMESPACE="{{.POD_NAMESPACE | default "openmcp-system"}}" DEV_DEBUG=true \
        go run "{{.ROOT_DIR2}}/cmd/{{.COMPONENTS}}/main.go" init \
          --environment "{{.ENVIRONMENT | default "local"}}" \
          --provider-name "{{.PROVIDER_NAME}}" \
          --verbosity "{{.VERBOSITY | default "DEBUG"}}"

  run-local:
    desc: "  Run the controller against a KinD cluster (requires run-local-init first)."
    summary: |
      Runs the operator against the platform cluster.
      Set 'PROVIDER_NAME' to the name of the ServiceProvider resource.
      Optionally set 'KUBECONFIG' to the path of the platform cluster kubeconfig.
      DEV_DEBUG=true is set automatically so the controller uses locally-reachable
      cluster addresses instead of in-cluster API server addresses.
    interactive: true
    requires:
      vars:
      - COMPONENTS
    vars:
      PROVIDER_NAME: '{{.PROVIDER_NAME | default .COMPONENTS}}'
    deps:
    - task: platform-cluster-check
      vars:
        POD_NAMESPACE: '{{.POD_NAMESPACE | default "openmcp-system"}}'
        KUBECONFIG: '{{.KUBECONFIG}}'
    cmds:
    - cmd: |
        {{if .KUBECONFIG}}KUBECONFIG="{{.KUBECONFIG}}" {{end}}POD_NAMESPACE="{{.POD_NAMESPACE | default "openmcp-system"}}" DEV_DEBUG=true \
        go run "{{.ROOT_DIR2}}/cmd/{{.COMPONENTS}}/main.go" run \
          --environment "{{.ENVIRONMENT | default "local"}}" \
          --provider-name "{{.PROVIDER_NAME}}" \
          --verbosity "{{.VERBOSITY | default "DEBUG"}}"
